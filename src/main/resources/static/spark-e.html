<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark-E - Electrician Trade Manager</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            animation: fadeIn 0.3s ease-out;
        }
        .modal-overlay.revenue-modal {
            z-index: 100;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideIn {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes slideInLeft {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes bounce {
            0%, 20%, 53%, 80%, 100% { transform: translate3d(0,0,0); }
            40%, 43% { transform: translate3d(0,-30px,0); }
            70% { transform: translate3d(0,-15px,0); }
            90% { transform: translate3d(0,-4px,0); }
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .modal-content {
            background: white;
            border-radius: 0.5rem;
            padding: 2rem;
            max-width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideIn 0.3s ease-out;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .form-input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 0.375rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            transform: translateY(-1px);
        }
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        .btn:active::after {
            width: 300px;
            height: 300px;
        }
        .btn-primary {
            background-color: #3b82f6;
            color: white;
            animation: slideInLeft 0.5s ease-out;
        }
        .btn-primary:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
        .btn-secondary {
            background-color: #6b7280;
            color: white;
        }
        .btn-secondary:hover {
            background-color: #5b6218;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(107, 114, 128, 0.3);
        }
        .card {
            background: white;
            border-radius: 0.5rem;
            padding: 1.5rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        .card:hover::before {
            left: 100%;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }
        .hover-scale {
            transition: transform 0.3s ease;
        }
        .hover-scale:hover {
            transform: scale(1.05);
        }
        .hover-bounce:hover {
            animation: bounce 1s;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        .pulse-animation {
            animation: pulse 2s infinite;
        }
        .slide-in-animation {
            animation: slideInLeft 0.5s ease-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        console.log('Spark-E React app starting...');
        
        const { useState, useEffect } = React;
        
        // API Service
        const api = {
            base: 'http://localhost:8080/api',
            
            async call(endpoint, options = {}) {
                const token = localStorage.getItem('jwtToken');
                const response = await fetch(`${this.base}${endpoint}`, {
                    headers: {
                        'Content-Type': 'application/json',
                        ...(token && { 'Authorization': `Bearer ${token}` })
                    },
                    ...options
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                return await response.json();
            }
        };

        // Main App Component
        const App = () => {
            const [user, setUser] = useState(null);
            const [showLogin, setShowLogin] = useState(false);
            const [showRegister, setShowRegister] = useState(false);
            const [showAddClient, setShowAddClient] = useState(false);
            const [showAddJob, setShowAddJob] = useState(false);
            const [showViewClients, setShowViewClients] = useState(false);
            const [showViewJobs, setShowViewJobs] = useState(false);
            const [showViewInvoices, setShowViewInvoices] = useState(false);
            const [showAddInvoice, setShowAddInvoice] = useState(false);
            const [showViewRevenue, setShowViewRevenue] = useState(false);
            const [showEditInvoice, setShowEditInvoice] = useState(false);
            const [editingInvoice, setEditingInvoice] = useState(null);
            const [showEditJob, setShowEditJob] = useState(false);
            const [editingJob, setEditingJob] = useState(null);
            const [revenuePeriod, setRevenuePeriod] = useState('monthly'); // monthly, yearly, total
            
            const [clients, setClients] = useState([]);
            const [jobs, setJobs] = useState([]);
            const [invoices, setInvoices] = useState([]);
            const [electricians, setElectricians] = useState([]);
            const [dashboardStats, setDashboardStats] = useState({});

            // Check authentication on mount
            useEffect(() => {
                const token = localStorage.getItem('jwtToken');
                if (token) {
                    setUser({ username: 'User' });
                    loadDashboardData();
                }
            }, []);

            // Navigation Component
            const Navigation = () => {
                return React.createElement('nav', { className: 'bg-blue-600 text-white shadow-lg' },
                    React.createElement('div', { className: 'container mx-auto px-4' },
                        React.createElement('div', { className: 'flex justify-between items-center py-4' },
                            React.createElement('div', { className: 'flex items-center space-x-3' },
                                React.createElement('i', { className: 'fas fa-bolt text-2xl' }),
                                React.createElement('h1', { className: 'text-xl font-bold' }, 'Spark-E')
                            ),
                            React.createElement('div', { className: 'flex items-center space-x-4' },
                                user ? 
                                    React.createElement('button', {
                                        onClick: () => {
                                            localStorage.removeItem('jwtToken');
                                            setUser(null);
                                        },
                                        className: 'bg-red-500 hover:bg-red-700 px-4 py-2 rounded transition'
                                    }, 'Logout')
                                :
                                    React.createElement(React.Fragment, null,
                                        React.createElement('button', {
                                            onClick: () => setShowLogin(true),
                                            className: 'bg-blue-500 hover:bg-blue-700 px-4 py-2 rounded transition'
                                        }, 'Login'),
                                        React.createElement('button', {
                                            onClick: () => setShowRegister(true),
                                            className: 'bg-green-500 hover:bg-green-700 px-4 py-2 rounded transition'
                                        }, 'Register')
                                    )
                            )
                        )
                    )
                );
            };

            // Dashboard Component
            const Dashboard = () => {
                return React.createElement('div', { className: 'container mx-auto px-4 py-8' },
                    React.createElement('div', { className: 'grid md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8' },
                        React.createElement('div', { className: 'bg-white p-6 rounded-lg shadow-md card hover-scale' },
                            React.createElement('div', { className: 'flex items-center justify-between' },
                                React.createElement('div', null,
                                    React.createElement('p', { className: 'text-gray-500 text-sm' }, 'Active Jobs'),
                                    React.createElement('p', { className: 'text-2xl font-bold text-gray-800' }, dashboardStats.activeJobs || 0)
                                ),
                                React.createElement('i', { className: 'fas fa-briefcase text-blue-500 text-2xl' })
                            )
                        ),
                        React.createElement('div', { className: 'bg-white p-6 rounded-lg shadow-md card hover-scale' },
                            React.createElement('div', { className: 'flex items-center justify-between' },
                                React.createElement('div', null,
                                    React.createElement('p', { className: 'text-gray-500 text-sm' }, 'Total Clients'),
                                    React.createElement('p', { className: 'text-2xl font-bold text-gray-800' }, dashboardStats.totalClients || 0)
                                ),
                                React.createElement('i', { className: 'fas fa-users text-green-500 text-2xl' })
                            )
                        ),
                        React.createElement('div', { className: 'bg-white p-6 rounded-lg shadow-md card hover-scale' },
                            React.createElement('div', { className: 'flex items-center justify-between' },
                                React.createElement('div', null,
                                    React.createElement('p', { className: 'text-gray-500 text-sm' }, 'Pending Invoices'),
                                    React.createElement('p', { className: 'text-2xl font-bold text-gray-800' }, dashboardStats.pendingInvoices || 0)
                                ),
                                React.createElement('i', { className: 'fas fa-file-invoice text-yellow-500 text-2xl' })
                            )
                        ),
                        React.createElement('div', { className: 'bg-white p-6 rounded-lg shadow-md card hover-scale' },
                            React.createElement('div', { className: 'flex items-center justify-between' },
                                React.createElement('div', null,
                                    React.createElement('p', { className: 'text-gray-500 text-sm' }, 'Monthly Revenue'),
                                    React.createElement('p', { className: 'text-2xl font-bold text-gray-800' }, '$' + (() => {
                                        // Calculate monthly revenue from completed jobs and their invoices
                                        const now = new Date();
                                        const currentYear = now.getFullYear();
                                        const currentMonth = now.getMonth();
                                        
                                        // Get invoices from current month
                                        const monthlyInvoices = invoices.filter(inv => {
                                            if (!inv.issueDate) return false;
                                            const invDate = new Date(inv.issueDate);
                                            return invDate.getFullYear() === currentYear && invDate.getMonth() === currentMonth;
                                        });
                                        
                                        // Calculate revenue from paid and unpaid invoices
                                        const monthlyRevenue = monthlyInvoices.reduce((sum, inv) => 
                                            sum + (inv.totalAmount || inv.amount || 0), 0
                                        );
                                        
                                        return monthlyRevenue.toFixed(2);
                                    })())
                                ),
                                React.createElement('i', { className: 'fas fa-chart-line text-purple-500 text-2xl' })
                            )
                        )
                    ),
                    
                    // Quick Actions
                    React.createElement('div', { className: 'bg-white rounded-lg shadow-md p-6 mb-6' },
                        React.createElement('h3', { className: 'text-xl font-semibold mb-4' }, 'Quick Actions'),
                        React.createElement('div', { className: 'grid md:grid-cols-3 gap-4' },
                            React.createElement('button', {
                                onClick: async () => {
                                    await Promise.all([loadClientsData(), loadElectricians()]);
                                    setShowAddJob(true);
                                },
                                className: 'btn btn-primary'
                            }, 'New Job'),
                            React.createElement('button', {
                                onClick: () => {
                                    if (!user) {
                                        alert('Please login to add a client');
                                        setShowLogin(true);
                                    } else {
                                        setShowAddClient(true);
                                    }
                                },
                                className: 'btn btn-secondary'
                            }, 'Add Client'),
                            React.createElement('button', {
                                onClick: async () => {
                                    await loadJobsData();
                                    setShowAddInvoice(true);
                                },
                                className: 'btn btn-secondary'
                            }, 'Create Invoice')
                        )
                    ),
                    
                    // View Data Actions
                    React.createElement('div', { className: 'bg-white rounded-lg shadow-md p-6' },
                        React.createElement('h3', { className: 'text-xl font-semibold mb-4' }, 'View Data'),
                        React.createElement('div', { className: 'grid md:grid-cols-4 gap-4' },
                            React.createElement('button', {
                                onClick: () => loadClients(),
                                className: 'bg-teal-500 hover:bg-teal-600 text-white py-3 px-4 rounded transition'
                            }, 'View Clients'),
                            React.createElement('button', {
                                onClick: () => loadJobs(),
                                className: 'bg-orange-500 hover:bg-orange-600 text-white py-3 px-4 rounded transition'
                            }, 'View Jobs'),
                            React.createElement('button', {
                                onClick: () => loadInvoices(),
                                className: 'bg-indigo-500 hover:bg-indigo-600 text-white py-3 px-4 rounded transition'
                            }, 'View Invoices'),
                            React.createElement('button', {
                                onClick: () => loadRevenue(),
                                className: 'bg-pink-500 hover:bg-pink-600 text-white py-3 px-4 rounded transition'
                            }, 'View Revenue')
                        )
                    )
                );
            };

            // Landing Page Component
            const LandingPage = () => {
                return React.createElement('div', { className: 'container mx-auto px-4 py-8' },
                    React.createElement('div', { className: 'text-center mb-12' },
                        React.createElement('h1', { className: 'text-4xl font-bold gradient-text mb-4 pulse-animation' }, '⚡ Spark-E'),
                        React.createElement('p', { className: 'text-xl text-gray-600 mb-8' }, 'Electrician Trade Business Manager'),
                        React.createElement('div', { className: 'grid md:grid-cols-3 gap-8 max-w-4xl mx-auto' },
                            React.createElement('div', { className: 'bg-white p-6 rounded-lg shadow-md card hover-scale' },
                                React.createElement('i', { className: 'fas fa-users text-blue-500 text-3xl mb-4' }),
                                React.createElement('h3', { className: 'font-semibold text-lg mb-2' }, 'Client Management'),
                                React.createElement('p', { className: 'text-gray-600' }, 'Keep track of your clients and their contact information')
                            ),
                            React.createElement('div', { className: 'bg-white p-6 rounded-lg shadow-md card hover-scale' },
                                React.createElement('i', { className: 'fas fa-briefcase text-green-500 text-3xl mb-4' }),
                                React.createElement('h3', { className: 'font-semibold text-lg mb-2' }, 'Job Tracking'),
                                React.createElement('p', { className: 'text-gray-600' }, 'Manage jobs, track progress, and schedule appointments')
                            ),
                            React.createElement('div', { className: 'bg-white p-6 rounded-lg shadow-md card hover-scale' },
                                React.createElement('i', { className: 'fas fa-file-invoice text-purple-500 text-3xl mb-4' }),
                                React.createElement('h3', { className: 'font-semibold text-lg mb-2' }, 'Invoice Management'),
                                React.createElement('p', { className: 'text-gray-600' }, 'Create invoices, track payments, and manage revenue')
                            )
                        )
                    ),
                    React.createElement('div', { className: 'text-center' },
                        React.createElement('h2', { className: 'text-2xl font-semibold mb-4' }, 'Get Started Today'),
                        React.createElement('p', { className: 'text-gray-600 mb-6' }, 'Join thousands of electricians managing their business with Spark-E'),
                        React.createElement('div', { className: 'space-x-4' },
                            React.createElement('button', {
                                onClick: () => setShowLogin(true),
                                className: 'bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold transition'
                            }, 'Login'),
                            React.createElement('button', {
                                onClick: () => setShowRegister(true),
                                className: 'bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-lg font-semibold transition'
                            }, 'Register')
                        )
                    )
                );
            };

            // Load functions
            const loadDashboardData = async () => {
                try {
                    const stats = await api.call('/dashboard/stats');
                    setDashboardStats(stats);
                } catch (error) {
                    console.error('Failed to load dashboard data:', error);
                }
            };

            const loadClients = async () => {
                try {
                    const data = await api.call('/customers');
                    setClients(data);
                    setShowViewClients(true);
                } catch (error) {
                    console.error('Failed to load clients:', error);
                }
            };

            const loadClientsData = async () => {
                try {
                    const data = await api.call('/customers');
                    setClients(data);
                } catch (error) {
                    console.error('Failed to load clients data:', error);
                }
            };

            const loadJobs = async () => {
                try {
                    const data = await api.call('/jobs');
                    setJobs(data);
                    setShowViewJobs(true);
                } catch (error) {
                    console.error('Failed to load jobs:', error);
                }
            };

            const loadJobsData = async () => {
                try {
                    const data = await api.call('/jobs');
                    setJobs(data);
                    console.log('Loaded jobs for invoice:', data);
                } catch (error) {
                    console.error('Failed to load jobs data:', error);
                }
            };

            const loadInvoices = async () => {
                try {
                    const data = await api.call('/invoices');
                    setInvoices(data);
                    setShowViewInvoices(true);
                } catch (error) {
                    console.error('Failed to load invoices:', error);
                }
            };

            const loadElectricians = async () => {
                try {
                    const data = await api.call('/electricians');
                    setElectricians(data);
                    console.log('Loaded electricians:', data);
                } catch (error) {
                    console.error('Failed to load electricians:', error);
                    // Create default electrician if API fails or no electricians exist
                    setElectricians([{ 
                        id: 1, 
                        name: 'Default Electrician',
                        email: 'electrician@spark-e.com',
                        phone: '555-0123',
                        hourlyRate: 75.0
                    }]);
                }
            };

            const loadRevenue = async () => {
                try {
                    // Only refresh data and open revenue modal
                    await Promise.all([loadInvoices(), loadJobs(), loadClients(), loadElectricians()]);
                    setShowViewRevenue(true);
                } catch (error) {
                    console.error('Failed to load revenue data:', error);
                }
            };

            // Auth functions
            const handleLogin = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const username = formData.get('username');
                const password = formData.get('password');

                try {
                    const response = await api.call('/auth/login', {
                        method: 'POST',
                        body: JSON.stringify({ username, password })
                    });

                    localStorage.setItem('jwtToken', response.token);
                    setUser({ username });
                    setShowLogin(false);
                    loadDashboardData();
                } catch (error) {
                    alert('Login failed: ' + error.message);
                }
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const userData = {
                    username: formData.get('username'),
                    password: formData.get('password'),
                    role: formData.get('role') || 'ROLE_ELECTRICIAN'
                };

                try {
                    await api.call('/auth/register', {
                        method: 'POST',
                        body: JSON.stringify(userData)
                    });

                    setShowRegister(false);
                    alert('Registration successful! Please login.');
                } catch (error) {
                    alert('Registration failed: ' + error.message);
                }
            };

            // Modal Components
            const LoginModal = () => {
                if (!showLogin) return null;
                return React.createElement('div', { className: 'modal-overlay' },
                    React.createElement('div', { className: 'modal-content' },
                        React.createElement('h3', { className: 'text-2xl font-bold mb-6' }, 'Login'),
                        React.createElement('form', { onSubmit: handleLogin },
                            React.createElement('input', { type: 'text', name: 'username', placeholder: 'Username', className: 'form-input', required: true }),
                            React.createElement('input', { type: 'password', name: 'password', placeholder: 'Password', className: 'form-input', required: true }),
                            React.createElement('div', { className: 'flex justify-between mt-4' },
                                React.createElement('button', { type: 'submit', className: 'btn btn-primary hover-bounce' }, 'Login'),
                                React.createElement('button', { type: 'button', onClick: () => setShowLogin(false), className: 'btn btn-secondary hover-bounce' }, 'Cancel')
                            )
                        )
                    )
                );
            };

            const RegisterModal = () => {
                if (!showRegister) return null;
                return React.createElement('div', { className: 'modal-overlay' },
                    React.createElement('div', { className: 'modal-content' },
                        React.createElement('h3', { className: 'text-2xl font-bold mb-6' }, 'Register'),
                        React.createElement('form', { onSubmit: handleRegister },
                            React.createElement('input', { type: 'text', name: 'username', placeholder: 'Username', className: 'form-input', required: true }),
                            React.createElement('input', { type: 'password', name: 'password', placeholder: 'Password', className: 'form-input', required: true }),
                            React.createElement('select', { name: 'role', className: 'form-input', required: true },
                                React.createElement('option', { value: 'ROLE_ELECTRICIAN' }, 'Electrician'),
                                React.createElement('option', { value: 'ROLE_ADMIN' }, 'Admin')
                            ),
                            React.createElement('div', { className: 'flex justify-between mt-4' },
                                React.createElement('button', { type: 'submit', className: 'btn btn-primary' }, 'Register'),
                                React.createElement('button', { type: 'button', onClick: () => setShowRegister(false), className: 'btn btn-secondary' }, 'Cancel')
                            )
                        )
                    )
                );
            };

            const AddClientModal = () => {
                if (!showAddClient) return null;
                if (!user) {
                    alert('Please login to add a client');
                    setShowAddClient(false);
                    setShowLogin(true);
                    return null;
                }
                return React.createElement('div', { className: 'modal-overlay' },
                    React.createElement('div', { className: 'modal-content' },
                        React.createElement('h3', { className: 'text-2xl font-bold mb-6' }, 'Add New Client'),
                        React.createElement('form', {
                            onSubmit: async (e) => {
                                e.preventDefault();
                                const formData = new FormData(e.target);
                                const clientData = {
                                    firstName: formData.get('firstName'),
                                    lastName: formData.get('lastName'),
                                    email: formData.get('email'),
                                    phone: formData.get('phone'),
                                    address: formData.get('address')
                                };
                                try {
                                    await api.call('/customers', {
                                        method: 'POST',
                                        body: JSON.stringify(clientData)
                                    });
                                    setShowAddClient(false);
                                    alert('Client added successfully!');
                                } catch (error) {
                                    alert('Failed to add client: ' + error.message);
                                }
                            }
                        },

                                                            setEditingInvoice(matchingInvoice);
                                                            setShowViewJobs(false);
                                                            setShowEditInvoice(true);
                                                        } else {
                                                            alert('No invoice found for this job. Generate an invoice first.');
                                                        }
                                                    }
                                                }, 
                                                className: 'bg-orange-500 hover:bg-orange-600 text-white px-3 py-1 rounded text-sm' 
                                            }, 'Edit Invoice'),
                                            React.createElement('button', { 
                                                onClick: async () => {
                                                    if (confirm(`Are you sure you want to delete this job: "${job.description}"?`)) {
                                                        try {
                                                            await api.call('/jobs/' + job.id, {
                                                                method: 'DELETE'
                                                            });
                                                            await loadJobs(); // Refresh jobs list
                                                            alert('Job deleted successfully!');
                                                        } catch (error) {
                                                            alert('Failed to delete job: ' + error.message);
                                                        }
                                                    }
                                                }, 
                                                className: 'bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm' 
                                            }, 'Delete')
                                        )
                                    )
                                )
                            )
                        ),
                        React.createElement('div', { className: 'flex justify-end mt-6' },
                            React.createElement('button', { onClick: () => setShowViewJobs(false), className: 'btn btn-secondary' }, 'Close')
                        )
                    )
                );
            };

            const ViewInvoicesModal = () => {
                if (!showViewInvoices) return null;
                return React.createElement('div', { className: 'modal-overlay' },
                    React.createElement('div', { className: 'modal-content' },
                        React.createElement('h3', { className: 'text-2xl font-bold mb-6' }, 'All Invoices'),
                        React.createElement('div', { className: 'space-y-4' },
                            ...invoices.map(invoice => 
                                React.createElement('div', { key: invoice.id, className: 'card' },
                                    React.createElement('div', { className: 'flex justify-between items-start' },
                                        React.createElement('div', { className: 'flex-1' },
                                            React.createElement('div', { className: 'flex justify-between items-start mb-2' },
                                                React.createElement('h4', { className: 'font-semibold text-lg' }, 
                                                    invoice.invoiceNumber ? 'Invoice #' + invoice.invoiceNumber : 'Invoice #' + invoice.id
                                                ),
                                                React.createElement('span', { 
                                                    className: invoice.paid ? 'bg-green-100 text-green-800 px-2 py-1 rounded text-sm' : 'bg-yellow-100 text-yellow-800 px-2 py-1 rounded text-sm'
                                                }, invoice.paid ? 'Paid' : 'Pending')
                                            ),
                                            invoice.job && React.createElement('p', { className: 'text-gray-600 text-sm mb-1' }, 
                                                'Job: ' + (invoice.job.description || 'No description')
                                            ),
                                            React.createElement('div', { className: 'grid grid-cols-2 gap-2 text-sm text-gray-600' },
                                                React.createElement('div', null,
                                                    React.createElement('p', null, 'Issue Date: ' + (invoice.issueDate || 'N/A')),
                                                    React.createElement('p', null, 'Due Date: ' + (invoice.dueDate || 'N/A'))
                                                ),
                                                React.createElement('div', null,
                                                    invoice.paidDate && React.createElement('p', null, 'Paid Date: ' + invoice.paidDate)
                                                )
                                            ),
                                            React.createElement('div', { className: 'mt-2 pt-2 border-t' },
                                                React.createElement('div', { className: 'grid grid-cols-2 gap-2 text-sm' },
                                                    React.createElement('div', null,
                                                        React.createElement('p', { className: 'text-gray-600' }, 'Labor: $' + (invoice.laborCost || '0.00')),
                                                        React.createElement('p', { className: 'text-gray-600' }, 'Materials: $' + (invoice.materialsCost || '0.00'))
                                                    ),
                                                    React.createElement('div', null,
                                                        React.createElement('p', { className: 'text-gray-600' }, 'Tax: $' + (invoice.tax || '0.00')),
                                                        React.createElement('p', { className: 'font-semibold text-gray-800' }, 'Total: $' + (invoice.totalAmount || invoice.amount || '0.00'))
                                                    )
                                                )
                                            )
                                        ),
                                        React.createElement('div', { className: 'flex space-x-2 ml-4' },
                                            React.createElement('button', { 
                                            onClick: async () => {
                                                await loadJobsData(); // Load jobs first
                                                setEditingInvoice(invoice);
                                                setShowViewInvoices(false); 
                                                setShowEditInvoice(true); 
                                            }, 
                                            className: 'bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded text-sm' 
                                        }, 'Edit'),
                                            React.createElement('button', { 
                                                onClick: async () => {
                                                    if (confirm(`Are you sure you want to delete this invoice: "${invoice.invoiceNumber ? 'Invoice #' + invoice.invoiceNumber : 'Invoice #' + invoice.id}"?`)) {
                                                        try {
                                                            await api.call('/invoices/' + invoice.id, {
                                                                method: 'DELETE'
                                                            });
                                                            await loadInvoices(); // Refresh invoices list
                                                            alert('Invoice deleted successfully!');
                                                        } catch (error) {
                                                            alert('Failed to delete invoice: ' + error.message);
                                                        }
                                                    }
                                                }, 
                                                className: 'bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm' 
                                            }, 'Delete')
                                        )
                                    )
                                )
                            )
                        ),
                        React.createElement('div', { className: 'flex justify-end mt-6' },
                            React.createElement('button', { onClick: () => setShowViewInvoices(false), className: 'btn btn-secondary' }, 'Close')
                        )
                    )
                );
            };

            const ViewRevenueModal = () => {
                if (!showViewRevenue) return null;
                
                // Get current date for filtering
                const now = new Date();
                const currentYear = now.getFullYear();
                const currentMonth = now.getMonth();
                
                // Filter invoices based on selected period
                const getFilteredInvoices = () => {
                    if (revenuePeriod === 'monthly') {
                        return invoices.filter(inv => {
                            if (!inv.issueDate) return false;
                            const invDate = new Date(inv.issueDate);
                            return invDate.getFullYear() === currentYear && invDate.getMonth() === currentMonth;
                        });
                    } else if (revenuePeriod === 'yearly') {
                        return invoices.filter(inv => {
                            if (!inv.issueDate) return false;
                            const invDate = new Date(inv.issueDate);
                            return invDate.getFullYear() === currentYear;
                        });
                    } else {
                        return invoices; // total - all invoices
                    }
                };
                
                const filteredInvoices = getFilteredInvoices();
                
                // Calculate revenue from filtered invoices
                const paidRevenue = filteredInvoices
                    .filter(inv => inv.paid)
                    .reduce((sum, inv) => sum + (inv.totalAmount || inv.amount || 0), 0);
                
                const unpaidRevenue = filteredInvoices
                    .filter(inv => !inv.paid)
                    .reduce((sum, inv) => sum + (inv.totalAmount || inv.amount || 0), 0);
                
                const totalRevenue = paidRevenue + unpaidRevenue;
                
                // Calculate job-based revenue
                const completedJobs = jobs.filter(job => job.status === 'COMPLETED');
                const activeJobs = jobs.filter(job => job.status === 'IN_PROGRESS');
                const scheduledJobs = jobs.filter(job => job.status === 'SCHEDULED');
                
                // Get period label
                const getPeriodLabel = () => {
                    if (revenuePeriod === 'monthly') {
                        return now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                    } else if (revenuePeriod === 'yearly') {
                        return currentYear.toString();
                    } else {
                        return 'All Time';
                    }
                };
                
                return React.createElement('div', { className: 'modal-overlay revenue-modal' },
                    React.createElement('div', { className: 'modal-content' },
                        React.createElement('div', { className: 'flex justify-between items-center mb-6' },
                            React.createElement('h3', { className: 'text-2xl font-bold' }, 'Revenue Summary'),
                            React.createElement('div', { className: 'flex space-x-2' },
                                React.createElement('button', {
                                    onClick: () => setRevenuePeriod('monthly'),
                                    className: revenuePeriod === 'monthly' ? 'bg-blue-500 text-white px-4 py-2 rounded' : 'bg-gray-200 text-gray-700 px-4 py-2 rounded hover:bg-gray-300'
                                }, 'Monthly'),
                                React.createElement('button', {
                                    onClick: () => setRevenuePeriod('yearly'),
                                    className: revenuePeriod === 'yearly' ? 'bg-blue-500 text-white px-4 py-2 rounded' : 'bg-gray-200 text-gray-700 px-4 py-2 rounded hover:bg-gray-300'
                                }, 'Yearly'),
                                React.createElement('button', {
                                    onClick: () => setRevenuePeriod('total'),
                                    className: revenuePeriod === 'total' ? 'bg-blue-500 text-white px-4 py-2 rounded' : 'bg-gray-200 text-gray-700 px-4 py-2 rounded hover:bg-gray-300'
                                }, 'Total')
                            )
                        ),
                        React.createElement('div', { className: 'bg-gray-50 p-4 rounded-lg mb-6' },
                            React.createElement('p', { className: 'text-center text-gray-600' }, 'Revenue for ' + getPeriodLabel())
                        ),
                        React.createElement('div', { className: 'grid md:grid-cols-3 gap-4 mb-6' },
                            React.createElement('div', { className: 'bg-blue-50 p-6 rounded-lg' },
                                React.createElement('h4', { className: 'font-semibold text-lg text-blue-800' }, 'Total Revenue'),
                                React.createElement('p', { className: 'text-3xl font-bold text-blue-600' }, '$' + totalRevenue.toFixed(2))
                            ),
                            React.createElement('div', { className: 'bg-green-50 p-6 rounded-lg' },
                                React.createElement('h4', { className: 'font-semibold text-lg text-green-800' }, 'Paid Revenue'),
                                React.createElement('p', { className: 'text-3xl font-bold text-green-600' }, '$' + paidRevenue.toFixed(2))
                            ),
                            React.createElement('div', { className: 'bg-yellow-50 p-6 rounded-lg' },
                                React.createElement('h4', { className: 'font-semibold text-lg text-yellow-800' }, 'Unpaid Revenue'),
                                React.createElement('p', { className: 'text-3xl font-bold text-yellow-600' }, '$' + unpaidRevenue.toFixed(2))
                            )
                        ),
                        React.createElement('div', { className: 'grid md:grid-cols-2 gap-6 mb-6' },
                            React.createElement('div', { className: 'bg-purple-50 p-6 rounded-lg' },
                                React.createElement('h4', { className: 'font-semibold text-lg text-purple-800 mb-3' }, 'Invoice Status'),
                                React.createElement('div', { className: 'space-y-2' },
                                    React.createElement('div', { className: 'flex justify-between' },
                                        React.createElement('span', { className: 'text-gray-600' }, 'Total Invoices:'),
                                        React.createElement('span', { className: 'font-semibold' }, filteredInvoices.length)
                                    ),
                                    React.createElement('div', { className: 'flex justify-between' },
                                        React.createElement('span', { className: 'text-green-600' }, 'Paid Invoices:'),
                                        React.createElement('span', { className: 'font-semibold text-green-600' }, filteredInvoices.filter(inv => inv.paid).length)
                                    ),
                                    React.createElement('div', { className: 'flex justify-between' },
                                        React.createElement('span', { className: 'text-yellow-600' }, 'Unpaid Invoices:'),
                                        React.createElement('span', { className: 'font-semibold text-yellow-600' }, filteredInvoices.filter(inv => !inv.paid).length)
                                    )
                                )
                            ),
                            React.createElement('div', { className: 'bg-indigo-50 p-6 rounded-lg' },
                                React.createElement('h4', { className: 'font-semibold text-lg text-indigo-800 mb-3' }, 'Job Status'),
                                React.createElement('div', { className: 'space-y-2' },
                                    React.createElement('div', { className: 'flex justify-between' },
                                        React.createElement('span', { className: 'text-gray-600' }, 'Total Jobs:'),
                                        React.createElement('span', { className: 'font-semibold' }, jobs.length)
                                    ),
                                    React.createElement('div', { className: 'flex justify-between' },
                                        React.createElement('span', { className: 'text-green-600' }, 'Completed:'),
                                        React.createElement('span', { className: 'font-semibold text-green-600' }, completedJobs.length)
                                    ),
                                    React.createElement('div', { className: 'flex justify-between' },
                                        React.createElement('span', { className: 'text-blue-600' }, 'In Progress:'),
                                        React.createElement('span', { className: 'font-semibold text-blue-600' }, activeJobs.length)
                                    ),
                                    React.createElement('div', { className: 'flex justify-between' },
                                        React.createElement('span', { className: 'text-gray-500' }, 'Scheduled:'),
                                        React.createElement('span', { className: 'font-semibold text-gray-500' }, scheduledJobs.length)
                                    )
                                )
                            )
                        ),
                        React.createElement('div', { className: 'bg-gray-100 p-4 rounded-lg' },
                            React.createElement('h4', { className: 'font-semibold text-lg text-gray-800 mb-2' }, 'Business Overview'),
                            React.createElement('div', { className: 'grid md:grid-cols-3 gap-4 text-sm' },
                                React.createElement('div', null,
                                    React.createElement('p', { className: 'text-gray-600' }, 'Total Clients: ' + clients.length),
                                    React.createElement('p', { className: 'text-gray-600' }, 'Total Electricians: ' + electricians.length)
                                ),
                                React.createElement('div', null,
                                    React.createElement('p', { className: 'text-gray-600' }, 'Avg Invoice Value: $' + (filteredInvoices.length > 0 ? (paidRevenue / filteredInvoices.length).toFixed(2) : '0.00')),
                                    React.createElement('p', { className: 'text-gray-600' }, 'Payment Rate: ' + (filteredInvoices.length > 0 ? ((paidRevenue / totalRevenue) * 100).toFixed(1) : '0') + '%')
                                ),
                                React.createElement('div', null,
                                    React.createElement('p', { className: 'text-gray-600' }, 'Active Jobs: ' + activeJobs.length),
                                    React.createElement('p', { className: 'text-gray-600' }, 'Pending Revenue: $' + unpaidRevenue.toFixed(2))
                                )
                            )
                        ),
                        React.createElement('div', { className: 'flex justify-end mt-6' },
                            React.createElement('button', { onClick: () => setShowViewRevenue(false), className: 'btn btn-secondary' }, 'Close')
                        )
                    )
                );
            };

            console.log('About to render app...');
            
            return React.createElement(React.Fragment, null,
                React.createElement(Navigation),
                user ? React.createElement(Dashboard) : React.createElement(LandingPage),
                React.createElement(LoginModal),
                React.createElement(RegisterModal),
                React.createElement(AddClientModal),
                React.createElement(AddJobModal),
                React.createElement(EditJobModal),
                React.createElement(AddInvoiceModal),
                React.createElement(EditInvoiceModal),
                React.createElement(ViewClientsModal),
                React.createElement(ViewJobsModal),
                React.createElement(ViewInvoicesModal),
                React.createElement(ViewRevenueModal)
            );
        };

        // Render the app
        console.log('Creating root element...');
        const root = ReactDOM.createRoot(document.getElementById('root'));
        console.log('Rendering Spark-E React app...');
        root.render(React.createElement(App));
        console.log('Spark-E React app rendered successfully!');
    </script>
</body>
</html>
