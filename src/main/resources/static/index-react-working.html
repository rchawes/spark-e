<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark-E - Electrician Trade Manager</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
        .modal-content {
            background: white;
            border-radius: 0.5rem;
            padding: 2rem;
            max-width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .form-input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 0.375rem;
            margin-bottom: 1rem;
        }
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-primary {
            background-color: #3b82f6;
            color: white;
        }
        .btn-primary:hover {
            background-color: #2563eb;
        }
        .btn-secondary {
            background-color: #6b7280;
            color: white;
        }
        .btn-secondary:hover {
            background-color: #5b6218;
        }
        .card {
            background: white;
            border-radius: 0.5rem;
            padding: 1.5rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        console.log('React app starting...');
        
        const { useState, useEffect } = React;
        
        // API Service
        const api = {
            base: 'http://localhost:8080/api',
            
            async call(endpoint, options = {}) {
                const token = localStorage.getItem('jwtToken');
                const response = await fetch(`${this.base}${endpoint}`, {
                    headers: {
                        'Content-Type': 'application/json',
                        ...(token && { 'Authorization': `Bearer ${token}` })
                    },
                    ...options
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                return await response.json();
            }
        };

        // Main App Component
        const App = () => {
            const [user, setUser] = useState(null);
            const [showLogin, setShowLogin] = useState(false);
            const [showRegister, setShowRegister] = useState(false);
            const [showAddClient, setShowAddClient] = useState(false);
            const [showAddJob, setShowAddJob] = useState(false);
            const [showViewClients, setShowViewClients] = useState(false);
            const [showViewJobs, setShowViewJobs] = useState(false);
            const [showViewInvoices, setShowViewInvoices] = useState(false);
            const [showViewRevenue, setShowViewRevenue] = useState(false);
            
            const [clients, setClients] = useState([]);
            const [jobs, setJobs] = useState([]);
            const [invoices, setInvoices] = useState([]);
            const [dashboardStats, setDashboardStats] = useState({});

            // Check authentication on mount
            useEffect(() => {
                const token = localStorage.getItem('jwtToken');
                if (token) {
                    setUser({ username: 'User' });
                    loadDashboardData();
                }
            }, []);

            // Navigation Component
            const Navigation = () => {
                return React.createElement('nav', { className: 'bg-blue-600 text-white shadow-lg' },
                    React.createElement('div', { className: 'container mx-auto px-4' },
                        React.createElement('div', { className: 'flex justify-between items-center py-4' },
                            React.createElement('div', { className: 'flex items-center space-x-3' },
                                React.createElement('i', { className: 'fas fa-bolt text-2xl' }),
                                React.createElement('h1', { className: 'text-xl font-bold' }, 'Spark-E')
                            ),
                            React.createElement('div', { className: 'flex items-center space-x-4' },
                                user ? 
                                    React.createElement('button', {
                                        onClick: () => {
                                            localStorage.removeItem('jwtToken');
                                            setUser(null);
                                        },
                                        className: 'bg-red-500 hover:bg-red-700 px-4 py-2 rounded transition'
                                    }, 'Logout')
                                :
                                    React.createElement(React.Fragment, null,
                                        React.createElement('button', {
                                            onClick: () => setShowLogin(true),
                                            className: 'bg-blue-500 hover:bg-blue-700 px-4 py-2 rounded transition'
                                        }, 'Login'),
                                        React.createElement('button', {
                                            onClick: () => setShowRegister(true),
                                            className: 'bg-green-500 hover:bg-green-700 px-4 py-2 rounded transition'
                                        }, 'Register')
                                    )
                            )
                        )
                    )
                );
            };

            // Dashboard Component
            const Dashboard = () => {
                return React.createElement('div', { className: 'container mx-auto px-4 py-8' },
                    React.createElement('div', { className: 'grid md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8' },
                        React.createElement('div', { className: 'bg-white p-6 rounded-lg shadow-md' },
                            React.createElement('div', { className: 'flex items-center justify-between' },
                                React.createElement('div', null,
                                    React.createElement('p', { className: 'text-gray-500 text-sm' }, 'Active Jobs'),
                                    React.createElement('p', { className: 'text-2xl font-bold text-gray-800' }, dashboardStats.activeJobs || 0)
                                ),
                                React.createElement('i', { className: 'fas fa-briefcase text-blue-500 text-2xl' })
                            )
                        ),
                        React.createElement('div', { className: 'bg-white p-6 rounded-lg shadow-md' },
                            React.createElement('div', { className: 'flex items-center justify-between' },
                                React.createElement('div', null,
                                    React.createElement('p', { className: 'text-gray-500 text-sm' }, 'Total Clients'),
                                    React.createElement('p', { className: 'text-2xl font-bold text-gray-800' }, dashboardStats.totalClients || 0)
                                ),
                                React.createElement('i', { className: 'fas fa-users text-green-500 text-2xl' })
                            )
                        ),
                        React.createElement('div', { className: 'bg-white p-6 rounded-lg shadow-md' },
                            React.createElement('div', { className: 'flex items-center justify-between' },
                                React.createElement('div', null,
                                    React.createElement('p', { className: 'text-gray-500 text-sm' }, 'Pending Invoices'),
                                    React.createElement('p', { className: 'text-2xl font-bold text-gray-800' }, dashboardStats.pendingInvoices || 0)
                                ),
                                React.createElement('i', { className: 'fas fa-file-invoice text-yellow-500 text-2xl' })
                            )
                        ),
                        React.createElement('div', { className: 'bg-white p-6 rounded-lg shadow-md' },
                            React.createElement('div', { className: 'flex items-center justify-between' },
                                React.createElement('div', null,
                                    React.createElement('p', { className: 'text-gray-500 text-sm' }, 'Monthly Revenue'),
                                    React.createElement('p', { className: 'text-2xl font-bold text-gray-800' }, '$' + (dashboardStats.monthlyRevenue || 0))
                                ),
                                React.createElement('i', { className: 'fas fa-chart-line text-purple-500 text-2xl' })
                            )
                        )
                    ),
                    
                    // Quick Actions
                    React.createElement('div', { className: 'bg-white rounded-lg shadow-md p-6 mb-6' },
                        React.createElement('h3', { className: 'text-xl font-semibold mb-4' }, 'Quick Actions'),
                        React.createElement('div', { className: 'grid md:grid-cols-3 gap-4' },
                            React.createElement('button', {
                                onClick: () => setShowAddJob(true),
                                className: 'btn btn-primary'
                            }, 'New Job'),
                            React.createElement('button', {
                                onClick: () => setShowAddClient(true),
                                className: 'btn btn-secondary'
                            }, 'Add Client'),
                            React.createElement('button', {
                                onClick: () => alert('Create Invoice feature coming soon!'),
                                className: 'btn btn-secondary'
                            }, 'Create Invoice')
                        )
                    ),
                    
                    // View Data Actions
                    React.createElement('div', { className: 'bg-white rounded-lg shadow-md p-6' },
                        React.createElement('h3', { className: 'text-xl font-semibold mb-4' }, 'View Data'),
                        React.createElement('div', { className: 'grid md:grid-cols-4 gap-4' },
                            React.createElement('button', {
                                onClick: () => loadClients(),
                                className: 'bg-teal-500 hover:bg-teal-600 text-white py-3 px-4 rounded transition'
                            }, 'View Clients'),
                            React.createElement('button', {
                                onClick: () => loadJobs(),
                                className: 'bg-orange-500 hover:bg-orange-600 text-white py-3 px-4 rounded transition'
                            }, 'View Jobs'),
                            React.createElement('button', {
                                onClick: () => loadInvoices(),
                                className: 'bg-indigo-500 hover:bg-indigo-600 text-white py-3 px-4 rounded transition'
                            }, 'View Invoices'),
                            React.createElement('button', {
                                onClick: () => loadRevenue(),
                                className: 'bg-pink-500 hover:bg-pink-600 text-white py-3 px-4 rounded transition'
                            }, 'View Revenue')
                        )
                    )
                );
            };

            // Landing Page Component
            const LandingPage = () => {
                return React.createElement('div', { className: 'container mx-auto px-4 py-8' },
                    React.createElement('div', { className: 'text-center mb-12' },
                        React.createElement('h1', { className: 'text-4xl font-bold text-gray-800 mb-4' }, '⚡ Spark-E'),
                        React.createElement('p', { className: 'text-xl text-gray-600 mb-8' }, 'Electrician Trade Business Manager'),
                        React.createElement('div', { className: 'grid md:grid-cols-3 gap-8 max-w-4xl mx-auto' },
                            React.createElement('div', { className: 'bg-white p-6 rounded-lg shadow-md' },
                                React.createElement('i', { className: 'fas fa-users text-blue-500 text-3xl mb-4' }),
                                React.createElement('h3', { className: 'font-semibold text-lg mb-2' }, 'Client Management'),
                                React.createElement('p', { className: 'text-gray-600' }, 'Keep track of your clients and their contact information')
                            ),
                            React.createElement('div', { className: 'bg-white p-6 rounded-lg shadow-md' },
                                React.createElement('i', { className: 'fas fa-briefcase text-green-500 text-3xl mb-4' }),
                                React.createElement('h3', { className: 'font-semibold text-lg mb-2' }, 'Job Tracking'),
                                React.createElement('p', { className: 'text-gray-600' }, 'Manage jobs, track progress, and schedule appointments')
                            ),
                            React.createElement('div', { className: 'bg-white p-6 rounded-lg shadow-md' },
                                React.createElement('i', { className: 'fas fa-file-invoice text-purple-500 text-3xl mb-4' }),
                                React.createElement('h3', { className: 'font-semibold text-lg mb-2' }, 'Invoice Management'),
                                React.createElement('p', { className: 'text-gray-600' }, 'Create invoices, track payments, and manage revenue')
                            )
                        )
                    ),
                    React.createElement('div', { className: 'text-center' },
                        React.createElement('h2', { className: 'text-2xl font-semibold mb-4' }, 'Get Started Today'),
                        React.createElement('p', { className: 'text-gray-600 mb-6' }, 'Join thousands of electricians managing their business with Spark-E'),
                        React.createElement('div', { className: 'space-x-4' },
                            React.createElement('button', {
                                onClick: () => setShowLogin(true),
                                className: 'bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold transition'
                            }, 'Login'),
                            React.createElement('button', {
                                onClick: () => setShowRegister(true),
                                className: 'bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-lg font-semibold transition'
                            }, 'Register')
                        )
                    )
                );
            };

            // Load functions
            const loadDashboardData = async () => {
                try {
                    const stats = await api.call('/dashboard/stats');
                    setDashboardStats(stats);
                } catch (error) {
                    console.error('Failed to load dashboard data:', error);
                }
            };

            const loadClients = async () => {
                try {
                    const data = await api.call('/customers');
                    setClients(data);
                    setShowViewClients(true);
                } catch (error) {
                    console.error('Failed to load clients:', error);
                }
            };

            const loadJobs = async () => {
                try {
                    const data = await api.call('/jobs');
                    setJobs(data);
                    setShowViewJobs(true);
                } catch (error) {
                    console.error('Failed to load jobs:', error);
                }
            };

            const loadInvoices = async () => {
                try {
                    const data = await api.call('/invoices');
                    setInvoices(data);
                    setShowViewInvoices(true);
                } catch (error) {
                    console.error('Failed to load invoices:', error);
                }
            };

            const loadRevenue = async () => {
                try {
                    const stats = await api.call('/dashboard/stats');
                    setDashboardStats(stats);
                    setShowViewRevenue(true);
                } catch (error) {
                    console.error('Failed to load revenue data:', error);
                }
            };

            // Auth functions
            const handleLogin = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const username = formData.get('username');
                const password = formData.get('password');

                try {
                    const response = await api.call('/auth/login', {
                        method: 'POST',
                        body: JSON.stringify({ username, password })
                    });

                    localStorage.setItem('jwtToken', response.token);
                    setUser({ username });
                    setShowLogin(false);
                    loadDashboardData();
                } catch (error) {
                    alert('Login failed: ' + error.message);
                }
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const userData = {
                    username: formData.get('username'),
                    password: formData.get('password'),
                    role: formData.get('role') || 'ROLE_ELECTRICIAN'
                };

                try {
                    await api.call('/auth/register', {
                        method: 'POST',
                        body: JSON.stringify(userData)
                    });

                    setShowRegister(false);
                    alert('Registration successful! Please login.');
                } catch (error) {
                    alert('Registration failed: ' + error.message);
                }
            };

            // Modal Components
            const LoginModal = () => {
                if (!showLogin) return null;
                return React.createElement('div', { className: 'modal-overlay' },
                    React.createElement('div', { className: 'modal-content' },
                        React.createElement('h3', { className: 'text-2xl font-bold mb-6' }, 'Login'),
                        React.createElement('form', { onSubmit: handleLogin },
                            React.createElement('input', { type: 'text', name: 'username', placeholder: 'Username', className: 'form-input', required: true }),
                            React.createElement('input', { type: 'password', name: 'password', placeholder: 'Password', className: 'form-input', required: true }),
                            React.createElement('div', { className: 'flex justify-between mt-4' },
                                React.createElement('button', { type: 'submit', className: 'btn btn-primary' }, 'Login'),
                                React.createElement('button', { type: 'button', onClick: () => setShowLogin(false), className: 'btn btn-secondary' }, 'Cancel')
                            )
                        )
                    )
                );
            };

            const RegisterModal = () => {
                if (!showRegister) return null;
                return React.createElement('div', { className: 'modal-overlay' },
                    React.createElement('div', { className: 'modal-content' },
                        React.createElement('h3', { className: 'text-2xl font-bold mb-6' }, 'Register'),
                        React.createElement('form', { onSubmit: handleRegister },
                            React.createElement('input', { type: 'text', name: 'username', placeholder: 'Username', className: 'form-input', required: true }),
                            React.createElement('input', { type: 'password', name: 'password', placeholder: 'Password', className: 'form-input', required: true }),
                            React.createElement('select', { name: 'role', className: 'form-input', required: true },
                                React.createElement('option', { value: 'ROLE_ELECTRICIAN' }, 'Electrician'),
                                React.createElement('option', { value: 'ROLE_ADMIN' }, 'Admin')
                            ),
                            React.createElement('div', { className: 'flex justify-between mt-4' },
                                React.createElement('button', { type: 'submit', className: 'btn btn-primary' }, 'Register'),
                                React.createElement('button', { type: 'button', onClick: () => setShowRegister(false), className: 'btn btn-secondary' }, 'Cancel')
                            )
                        )
                    )
                );
            };

            const AddClientModal = () => {
                if (!showAddClient) return null;
                return React.createElement('div', { className: 'modal-overlay' },
                    React.createElement('div', { className: 'modal-content' },
                        React.createElement('h3', { className: 'text-2xl font-bold mb-6' }, 'Add New Client'),
                        React.createElement('form', {
                            onSubmit: async (e) => {
                                e.preventDefault();
                                const formData = new FormData(e.target);
                                const clientData = {
                                    firstName: formData.get('firstName'),
                                    lastName: formData.get('lastName'),
                                    email: formData.get('email'),
                                    phone: formData.get('phone'),
                                    address: formData.get('address')
                                };
                                try {
                                    await api.call('/customers', {
                                        method: 'POST',
                                        body: JSON.stringify(clientData)
                                    });
                                    setShowAddClient(false);
                                    alert('Client added successfully!');
                                } catch (error) {
                                    alert('Failed to add client: ' + error.message);
                                }
                            }
                        },
                            React.createElement('input', { type: 'text', name: 'firstName', placeholder: 'First Name', className: 'form-input', required: true }),
                            React.createElement('input', { type: 'text', name: 'lastName', placeholder: 'Last Name', className: 'form-input', required: true }),
                            React.createElement('input', { type: 'email', name: 'email', placeholder: 'Email', className: 'form-input', required: true }),
                            React.createElement('input', { type: 'tel', name: 'phone', placeholder: 'Phone', className: 'form-input', required: true }),
                            React.createElement('input', { type: 'text', name: 'address', placeholder: 'Address', className: 'form-input', required: true }),
                            React.createElement('div', { className: 'flex justify-end mt-4' },
                                React.createElement('button', { type: 'submit', className: 'btn btn-primary' }, 'Add Client'),
                                React.createElement('button', { type: 'button', onClick: () => setShowAddClient(false), className: 'btn btn-secondary' }, 'Cancel')
                            )
                        )
                    )
                );
            };

            const AddJobModal = () => {
                if (!showAddJob) return null;
                return React.createElement('div', { className: 'modal-overlay' },
                    React.createElement('div', { className: 'modal-content' },
                        React.createElement('h3', { className: 'text-2xl font-bold mb-6' }, 'Create New Job'),
                        React.createElement('form', {
                            onSubmit: async (e) => {
                                e.preventDefault();
                                const formData = new FormData(e.target);
                                const jobData = {
                                    description: formData.get('description'),
                                    status: formData.get('status'),
                                    hoursWorked: parseFloat(formData.get('hoursWorked')) || 0
                                };
                                try {
                                    await api.call('/jobs', {
                                        method: 'POST',
                                        body: JSON.stringify(jobData)
                                    });
                                    setShowAddJob(false);
                                    alert('Job created successfully!');
                                } catch (error) {
                                    alert('Failed to create job: ' + error.message);
                                }
                            }
                        },
                            React.createElement('textarea', { name: 'description', placeholder: 'Job Description', className: 'form-input', rows: 3, required: true }),
                            React.createElement('select', { name: 'status', className: 'form-input', required: true },
                                React.createElement('option', { value: 'SCHEDULED' }, 'Scheduled'),
                                React.createElement('option', { value: 'IN_PROGRESS' }, 'In Progress'),
                                React.createElement('option', { value: 'COMPLETED' }, 'Completed')
                            ),
                            React.createElement('input', { type: 'number', name: 'hoursWorked', placeholder: 'Hours Worked', className: 'form-input', step: '0.5', min: '0' }),
                            React.createElement('div', { className: 'flex justify-end mt-4' },
                                React.createElement('button', { type: 'submit', className: 'btn btn-primary' }, 'Create Job'),
                                React.createElement('button', { type: 'button', onClick: () => setShowAddJob(false), className: 'btn btn-secondary' }, 'Cancel')
                            )
                        )
                    )
                );
            };

            const ViewClientsModal = () => {
                if (!showViewClients) return null;
                return React.createElement('div', { className: 'modal-overlay' },
                    React.createElement('div', { className: 'modal-content' },
                        React.createElement('h3', { className: 'text-2xl font-bold mb-6' }, 'All Clients'),
                        React.createElement('div', { className: 'space-y-4' },
                            ...clients.map(client => 
                                React.createElement('div', { key: client.id, className: 'card' },
                                    React.createElement('div', { className: 'flex justify-between items-start' },
                                        React.createElement('div', null,
                                            React.createElement('h4', { className: 'font-semibold text-lg' }, client.firstName + ' ' + client.lastName),
                                            React.createElement('p', { className: 'text-gray-600 text-sm' }, client.email),
                                            React.createElement('p', { className: 'text-gray-600 text-sm' }, client.phone),
                                            React.createElement('p', { className: 'text-gray-600 text-sm' }, client.address)
                                        ),
                                        React.createElement('div', { className: 'flex space-x-2' },
                                            React.createElement('button', { className: 'bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded text-sm' }, 'Edit'),
                                            React.createElement('button', { className: 'bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm' }, 'Delete')
                                        )
                                    )
                                )
                            )
                        ),
                        React.createElement('div', { className: 'flex justify-end mt-6' },
                            React.createElement('button', { onClick: () => setShowViewClients(false), className: 'btn btn-secondary' }, 'Close')
                        )
                    )
                );
            };

            const ViewJobsModal = () => {
                if (!showViewJobs) return null;
                return React.createElement('div', { className: 'modal-overlay' },
                    React.createElement('div', { className: 'modal-content' },
                        React.createElement('h3', { className: 'text-2xl font-bold mb-6' }, 'All Jobs'),
                        React.createElement('div', { className: 'space-y-4' },
                            ...jobs.map(job => 
                                React.createElement('div', { key: job.id, className: 'card' },
                                    React.createElement('div', { className: 'flex justify-between items-start' },
                                        React.createElement('div', null,
                                            React.createElement('h4', { className: 'font-semibold text-lg' }, job.description),
                                            React.createElement('p', { className: 'text-gray-600 text-sm' }, 'Status: ' + job.status),
                                            React.createElement('p', { className: 'text-gray-600 text-sm' }, 'Hours: ' + (job.hoursWorked || 0))
                                        ),
                                        React.createElement('div', { className: 'flex space-x-2' },
                                            React.createElement('button', { className: 'bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded text-sm' }, 'Edit'),
                                            React.createElement('button', { className: 'bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm' }, 'Delete')
                                        )
                                    )
                                )
                            )
                        ),
                        React.createElement('div', { className: 'flex justify-end mt-6' },
                            React.createElement('button', { onClick: () => setShowViewJobs(false), className: 'btn btn-secondary' }, 'Close')
                        )
                    )
                );
            };

            const ViewInvoicesModal = () => {
                if (!showViewInvoices) return null;
                return React.createElement('div', { className: 'modal-overlay' },
                    React.createElement('div', { className: 'modal-content' },
                        React.createElement('h3', { className: 'text-2xl font-bold mb-6' }, 'All Invoices'),
                        React.createElement('div', { className: 'space-y-4' },
                            ...invoices.map(invoice => 
                                React.createElement('div', { key: invoice.id, className: 'card' },
                                    React.createElement('div', { className: 'flex justify-between items-start' },
                                        React.createElement('div', null,
                                            React.createElement('h4', { className: 'font-semibold text-lg' }, 'Invoice #' + invoice.id),
                                            React.createElement('p', { className: 'text-gray-600 text-sm' }, 'Amount: $' + (invoice.amount || '0.00')),

                            React.createElement('div', { className: 'bg-blue-50 p-6 rounded-lg' },

                                React.createElement('h4', { className: 'font-semibold text-lg text-green-800' }, 'Paid Invoices'),
                                React.createElement('p', { className: 'text-3xl font-bold text-green-600' }, dashboardStats.totalClients || 0)
                            )

                        React.createElement('div', { className: 'mt-6 bg-gray-100 p-4 rounded-lg' },
                            React.createElement('h4', { className: 'font-semibold text-lg text-gray-800' }, 'Revenue Breakdown'),
                            React.createElement('p', { className: 'text-gray-600' }, 'Active Jobs: ' + (dashboardStats.activeJobs || 0)),

            console.log('About to render app...');
            
            return React.createElement(React.Fragment, null,
                React.createElement(Navigation),
                user ? React.createElement(Dashboard) : React.createElement(LandingPage),
                React.createElement(LoginModal),
                React.createElement(RegisterModal),
                React.createElement(AddClientModal),
                React.createElement(AddJobModal),
                React.createElement(ViewClientsModal),
                React.createElement(ViewJobsModal),
                React.createElement(ViewInvoicesModal),
                React.createElement(ViewRevenueModal)

        };

        // Render the app
        console.log('Creating root element...');
        const root = ReactDOM.createRoot(document.getElementById('root'));
        console.log('Rendering React app...');
        root.render(React.createElement(App));
        console.log('React app rendered successfully!');
