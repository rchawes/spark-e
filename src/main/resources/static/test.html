<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark-E Test</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body>
    <div id="root"></div>
    <script>
        const { useState } = React;
        
        const App = () => {
            const [count, setCount] = useState(0);
            
            return React.createElement('div', { 
                className: 'min-h-screen bg-gray-100 flex items-center justify-center'
            },
                React.createElement('div', { className: 'bg-white p-8 rounded-lg shadow-lg' },
                    React.createElement('h1', { className: 'text-3xl font-bold text-blue-600 mb-4' }, '⚡ Spark-E Test'),
                    React.createElement('p', { className: 'text-gray-700 mb-4' }, 'React is working!'),
                    React.createElement('button', {
                        onClick: () => setCount(count + 1),
                        className: 'bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded'
                    }, `Click count: ${count}`),
                    React.createElement('div', { className: 'mt-4' },
                        React.createElement('a', {
                            href: 'spark-e.html',
                            className: 'text-blue-500 underline'
                        }, 'Go to Full App →')
                    )
                )
            );
        };
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
