<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark-E - Electrician Trade Manager</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f3f4f6;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        console.log('React script loading...');
        
        const { useState, useEffect } = React;
        
        // Simple test component
        const TestApp = () => {
            console.log('TestApp component rendering...');
            
            return React.createElement('div', {
                style: {
                    padding: '2rem',
                    textAlign: 'center',
                    backgroundColor: 'white',
                    margin: '2rem',
                    borderRadius: '0.5rem',
                    boxShadow: '0 4px 6px rgba(0, 0, 0, 0.1)'
                }
            }, [
                React.createElement('h1', {
                    key: 'title',
                    style: { color: '#3b82f6', marginBottom: '1rem' }
                }, '⚡ Spark-E React Test'),
                React.createElement('p', {
                    key: 'subtitle',
                    style: { color: '#4b5563', marginBottom: '2rem' }
                }, 'React is working!'),
                React.createElement('button', {
                    key: 'button',
                    onClick: () => alert('React button clicked!'),
                    style: {
                        background: '#3b82f6',
                        color: 'white',
                        border: 'none',
                        padding: '0.75rem 1.5rem',
                        borderRadius: '0.375rem',
                        cursor: 'pointer'
                    }
                }, 'Test React Button')
            ]);
        };
        
        // Render the test app
        console.log('About to render React app...');
        
        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            console.log('Root created, rendering...');
            root.render(React.createElement(TestApp));
            console.log('React app rendered successfully!');
        } catch (error) {
            console.error('Error rendering React app:', error);
            document.getElementById('root').innerHTML = `
                <div style="text-align: center; padding: 2rem;">
                    <h1 style="color: red;">React Error</h1>
                    <p>${error.message}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
