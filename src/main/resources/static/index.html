<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark-E - Electrician Trade Manager</title>
    <meta http-equiv="refresh" content="0; url=index-react.html">
</head>
<body>
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif;">
        <div style="text-align: center; padding: 2rem;">
            <h1 style="color: #3b82f6; margin-bottom: 1rem;">⚡ Spark-E</h1>
            <h2 style="color: #4b5563; margin-bottom: 2rem;">Redirecting to Modern React Application...</h2>
            <div style="background: #f3f4f6; border-radius: 0.5rem; padding: 1.5rem; margin-bottom: 1rem;">
                <p style="margin-bottom: 1rem;">✨ <strong>Modern React Version</strong></p>
                <p style="margin-bottom: 1rem;">🚀 <strong>Component-Based Architecture</strong></p>
                <p style="margin-bottom: 1rem;">📱 <strong>Responsive Design</strong></p>
                <p style="margin-bottom: 1rem;">⚡ <strong>Real-Time Data Updates</strong></p>
            </div>
            <div style="background: #e5e7eb; border-radius: 0.5rem; padding: 1.5rem;">
                <p style="margin-bottom: 1rem;"><strong>🔄 Auto-redirecting in 3 seconds...</strong></p>
                <div style="width: 100%; background: #ddd; border-radius: 0.25rem; height: 0.5rem; margin-bottom: 1rem;">
                    <div id="progressBar" style="width: 0%; height: 100%; background: #4caf50; border-radius: 0.25rem; transition: width 3s ease-in-out;"></div>
                </div>
            <div style="margin-top: 2rem;">
                <button onclick="window.location.href='index-react.html'" style="background: #3b82f6; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 0.375rem; cursor: pointer; font-size: 1rem;">
                    Go to React App →
                </button>
            </div>
        </div>
    </div>

    <script>
        let progress = 0;
        const progressBar = document.getElementById('progressBar');
        
        const updateProgress = () => {
            progress += 33.33;
            progressBar.style.width = progress + '%';
            
            if (progress >= 100) {
                window.location.href = 'index-react.html';
            } else {
                setTimeout(updateProgress, 1000);
            }
        };
        
        setTimeout(updateProgress, 1000);
    </script>
</body>
</html>
