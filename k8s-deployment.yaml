---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: spark-e-hpa
  labels:
    app: spark-e
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: spark-e-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spark-e-ingress
  labels:
    app: spark-e
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - app.spark-e.com
    - www.spark-e.com
    secretName: spark-e-tls
  rules:
  - host: app.spark-e.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: spark-e-service
            port:
              number: 80
  - host: www.spark-e.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: spark-e-service
            port:
              number: 80

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: spark-e-pdb
  labels:
    app: spark-e
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: spark-e

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-e-config
  labels:
    app: spark-e
data:
  application.yml: |
    server:
      port: 8080
      servlet:
        context-path: /
    spring:
      profiles:
        active: prod
      datasource:
        url: ${DATABASE_URL}
        username: ${DATABASE_USER}
        password: ${DATABASE_PASSWORD}
        driver-class-name: org.postgresql.Driver
        hikari:
          connection-timeout: 20000
          maximum-pool-size: 20
          minimum-idle: 5
      jpa:
        database-platform: org.hibernate.dialect.PostgreSQLDialect
        hibernate:
          ddl-auto: update
          show-sql: false
        properties:
          hibernate:
            jdbc:
              batch_size: 20
              order_inserts: true
              order_updates: true
      cache:
        type: redis
        redis:
          host: ${REDIS_HOST}
          port: ${REDIS_PORT}
          password: ${REDIS_PASSWORD}
          timeout: 2000ms
    management:
      endpoints:
        web:
          exposure:
            include: health,info,metrics
      endpoint:
        health:
          show-details: when-authorized
    logging:
      level:
        org.springframework.web: INFO
        org.hibernate: INFO
        com.electrician.spark_e: INFO
