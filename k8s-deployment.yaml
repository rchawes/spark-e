# Spark-E Kubernetes Deployment Configuration
# Production-ready deployment for cloud scalability

apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-e-app
  labels:
    app: spark-e
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: spark-e
  template:
    metadata:
      labels:
        app: spark-e
    spec:
      containers:
      - name: spark-e-app
        image: spark-e:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        # Database Configuration
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: spark-e-secrets
              key: database-url
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: spark-e-secrets
              key: database-user
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: spark-e-secrets
              key: database-password
              
        # Redis Configuration
        - name: REDIS_HOST
          value: "spark-e-redis-service"
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: spark-e-secrets
              key: redis-password
              
        # Application Configuration
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: spark-e-secrets
              key: jwt-secret
              
        # AWS Configuration
        - name: AWS_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: spark-e-secrets
              key: aws-access-key
        - name: AWS_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: spark-e-secrets
              key: aws-secret-key
        - name: AWS_S3_BUCKET
          value: "spark-e-app-storage"
          
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: logs
        emptyDir: {}
      imagePullSecrets:
      - name: docker-registry-secret

---
apiVersion: v1
kind: Service
metadata:
  name: spark-e-service
  labels:
    app: spark-e
spec:
  selector:
    app: spark-e
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  type: LoadBalancer
  sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
  name: spark-e-redis-service
  labels:
    app: spark-e-redis
spec:
  selector:
    app: spark-e-redis
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
    protocol: TCP
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-e-redis
  labels:
    app: spark-e-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-e-redis
  template:
    metadata:
      labels:
        app: spark-e-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: spark-e-secrets
              key: redis-password
        command:
        - redis-server
        - --requirepass
        - $(REDIS_PASSWORD)
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - redis-cli
            - --raw
            - incr
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: redis-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  labels:
    app: spark-e-redis
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: gp2

