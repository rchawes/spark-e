name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: sparkedb_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Run tests
      env:
        DATABASE_URL: jdbc:postgresql://localhost:5432/sparkedb_test
        DATABASE_USERNAME: testuser
        DATABASE_PASSWORD: testpass
        JWT_SECRET: test-secret-key-for-github-actions-testing
        SPRING_PROFILES_ACTIVE: test
      run: |
        mvn clean test

    - name: Generate test coverage report
      env:
        DATABASE_URL: jdbc:postgresql://localhost:5432/sparkedb_test
        DATABASE_USERNAME: testuser
        DATABASE_PASSWORD: testpass
        JWT_SECRET: test-secret-key-for-github-actions-testing
        SPRING_PROFILES_ACTIVE: test
      run: |
        mvn jacoco:report

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./target/site/jacoco/jacoco.xml
        flags: unittests
        name: codecov-umbrella

    - name: Run integration tests
      env:
        DATABASE_URL: jdbc:postgresql://localhost:5432/sparkedb_test
        DATABASE_USERNAME: testuser
        DATABASE_PASSWORD: testpass
        JWT_SECRET: test-secret-key-for-github-actions-testing
        SPRING_PROFILES_ACTIVE: test
      run: |
        mvn verify -P integration-tests

    - name: Build application
      run: mvn clean package -DskipTests

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: spark-e-jar
        path: target/*.jar

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/spark-e:latest
          ${{ secrets.DOCKER_USERNAME }}/spark-e:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to Render
      run: |
        echo "🚀 Deploying to Render..."
        
        # Trigger Render deployment
        RESPONSE=$(curl -s -w "%{http_code}" -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/restart" \
          -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
          -H "Content-Type: application/json")
        
        HTTP_CODE="${RESPONSE: -3}"
        RESPONSE_BODY="${RESPONSE%???}"
        
        echo "Render API Response: $RESPONSE_BODY"
        echo "HTTP Status Code: $HTTP_CODE"
        
        if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "202" ]; then
          echo "❌ Failed to trigger Render deployment"
          echo "Response: $RESPONSE_BODY"
          exit 1
        fi
        
        echo "✅ Render deployment triggered successfully"

    - name: Wait for deployment completion
      run: |
        echo "⏳ Waiting for Render deployment to complete..."
        
        # Poll deployment status
        for i in {1..30}; do
          echo "Checking deployment status... (Attempt $i/30)"
          
          # Check if the application is responding
          if curl -f -s "https://spark-e.onrender.com/api/health" > /dev/null; then
            echo "✅ Deployment completed successfully!"
            break
          fi
          
          if [ $i -eq 30 ]; then
            echo "❌ Deployment timeout after 5 minutes"
            exit 1
          fi
          
          sleep 10
        done

    - name: Verify deployment health
      run: |
        echo "🔍 Verifying deployment health..."
        
        # Check health endpoint
        HEALTH_RESPONSE=$(curl -s "https://spark-e.onrender.com/api/health")
        echo "Health check response: $HEALTH_RESPONSE"
        
        # Check readiness endpoint
        READY_RESPONSE=$(curl -s "https://spark-e.onrender.com/api/ready")
        echo "Readiness check response: $READY_RESPONSE"
        
        # Verify application is responding correctly
        if echo "$HEALTH_RESPONSE" | grep -q '"status":"UP"'; then
          echo "✅ Health check passed"
        else
          echo "❌ Health check failed"
          exit 1
        fi
        
        if echo "$READY_RESPONSE" | grep -q '"status":"READY"'; then
          echo "✅ Readiness check passed"
        else
          echo "❌ Readiness check failed"
          exit 1
        fi

    - name: Post-deployment verification
      run: |
        echo "🔍 Running post-deployment verification..."
        
        # Test API endpoints
        echo "Testing API endpoints..."
        
        # Test authentication endpoint (should be accessible)
        if curl -f -s "https://spark-e.onrender.com/api/health" > /dev/null; then
          echo "✅ Health endpoint accessible"
        else
          echo "❌ Health endpoint not accessible"
          exit 1
        fi
        
        # Test that the application is serving content
        CONTENT_CHECK=$(curl -s "https://spark-e.onrender.com/spark-e.html")
        if echo "$CONTENT_CHECK" | grep -q "Spark-E"; then
          echo "✅ Frontend serving correctly"
        else
          echo "❌ Frontend not serving correctly"
          exit 1
        fi

    - name: Deployment success notification
      run: |
        echo "🎉 Deployment completed successfully!"
        echo "📊 Deployment Summary:"
        echo "  ✅ Health checks passed"
        echo "  ✅ API endpoints responding"
        echo "  ✅ Frontend serving correctly"
        echo "  🌐 Live at: https://spark-e.onrender.com"

    - name: Deployment failure notification
      if: failure()
      run: |
        echo "❌ Deployment failed!"
        echo "🔍 Troubleshooting steps:"
        echo "  1. Check Render dashboard for deployment logs"
        echo "  2. Verify environment variables are set correctly"
        echo "  3. Check database connectivity"
        echo "  4. Review application logs for errors"
