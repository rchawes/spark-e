# Production Cloud Database Configuration
# PostgreSQL on AWS RDS

# Database Connection
spring.datasource.url=jdbc:postgresql://spark-e-prod.c3usd2k3l4e.us-west-2.rds.amazonaws.com:5432/spark_e_prod
spring.datasource.username=spark_e_admin
spring.datasource.password=${DB_PASSWORD:defaultPassword123!}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Connection Pooling (HikariCP)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Performance Optimization
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Caching Configuration
spring.cache.type=redis
spring.redis.host=spark-e-redis.cache.amazonaws.com
spring.redis.port=6379
spring.redis.password=${REDIS_PASSWORD:redisPassword123!}
spring.redis.timeout=2000ms
spring.redis.jedis.pool.max-active=8
spring.redis.jedis.pool.max-idle=8
spring.redis.jedis.pool.min-idle=0

# Logging Configuration
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.com.electrician.spark_e=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Actuator/Health Checks
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true
management.health.redis.enabled=true

# File Storage (AWS S3)
aws.s3.bucket=spark-e-app-storage
aws.s3.region=us-west-2
aws.access.key=${AWS_ACCESS_KEY}
aws.secret.key=${AWS_SECRET_KEY}

# Application Configuration
server.port=8080
server.servlet.context-path=/
spring.application.name=spark-e-prod

# Security Configuration
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-here-must-be-very-long-and-secure}
jwt.expiration=86400000

# CORS Configuration
cors.allowed.origins=https://app.spark-e.com,https://www.spark-e.com
cors.allowed.methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed.headers=Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Mx-ReqToken,Keep-Alive,X-Requested-With,If-Modified-Since
