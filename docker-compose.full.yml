version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: spark-e-db
    environment:
      POSTGRES_DB: sparkedb
      POSTGRES_USER: sparkuser
      POSTGRES_PASSWORD: sparkpass
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db/init:/docker-entrypoint-initdb.d
    networks:
      - spark-e-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sparkuser -d sparkedb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: spark-e-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - spark-e-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: spark-e-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    networks:
      - spark-e-network
    depends_on:
      - spark-e-app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Spring Boot Application
  spark-e-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: spark-e:latest
    container_name: spark-e-app
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DATABASE_URL: jdbc:postgresql://postgres:5432/sparkedb
      DATABASE_USERNAME: sparkuser
      DATABASE_PASSWORD: sparkpass
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-for-docker-development}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JAVA_OPTS: "-Xms512m -Xmx1024m -XX:+UseG1GC -XX:+UseContainerSupport"
      SERVER_PORT: 8082
    ports:
      - "8082:8082"
    volumes:
      - app_uploads:/var/data/uploads
      - app_logs:/var/log/app
    networks:
      - spark-e-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  # MinIO for File Storage
  minio:
    image: minio/minio:latest
    container_name: spark-e-minio
    environment:
      MINIO_ROOT_USER: sparkuser
      MINIO_ROOT_PASSWORD: sparkpass
      MINIO_DEFAULT_BUCKETS: spark-e-files
      MINIO_SERVER_URL: http://minio:9000
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - spark-e-network
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Monitoring with Prometheus (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: spark-e-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - spark-e-network
    restart: unless-stopped

  # Grafana for Dashboard (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: spark-e-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: false
    networks:
      - spark-e-network
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  app_uploads:
    driver: local
  app_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  spark-e-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
