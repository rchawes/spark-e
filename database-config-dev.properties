# Development Database Configuration
# Local PostgreSQL for development

# Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/spark_e_dev
spring.datasource.username=spark_e_dev
spring.datasource.password=devPassword123!
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Connection Pooling (HikariCP)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Performance Optimization
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Caching Configuration (Local Redis)
spring.cache.type=redis
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=devRedis123!
spring.redis.timeout=2000ms

# Logging Configuration
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=DEBUG
logging.level.com.electrician.spark_e=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Application Configuration
server.port=8080
spring.application.name=spark-e-dev

# Security Configuration
jwt.secret=dev-secret-key-for-local-development-only-not-for-production
jwt.expiration=86400000

# CORS Configuration
cors.allowed.origins=http://localhost:3000,http://127.0.0.1:3000
cors.allowed.methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed.headers=Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Mx-ReqToken,Keep-Alive,X-Requested-With,If-Modified-Since
